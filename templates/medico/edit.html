{% extends 'base.html' %}
{% block title %}Editar Médico{% endblock %}

{% block content %}

<h1>Editar Médico</h1>

<form action="{{ url_for('medico.edit', id=medico.id_medico) }}" method="POST">

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ medico.nombre }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Especialidad</label>
        <input type="text" name="especialidad" class="form-control" value="{{ medico.especialidad }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control" value="{{ medico.telefono }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" name="correo" class="form-control" value="{{ medico.correo }}">
    </div>

    <button type="submit" class="btn btn-warning">
        Actualizar
    </button>

</form>

{% endblock %}
